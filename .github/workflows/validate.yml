name: Validate

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate YAML format & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML format
        run: python3 scripts/validate_yaml_format.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
